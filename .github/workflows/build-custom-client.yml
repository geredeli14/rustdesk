name: Build Custom RustDesk Client

on:
  workflow_dispatch:
    inputs:
      upload-artifact:
        type: boolean
        default: true
        description: 'Upload Artifact'

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.75"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build-rustdesk-windows:
    name: Build RustDesk for Windows
    runs-on: windows-2022
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: rustfmt

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: "15.0"

      - name: Install dependencies
        run: |
          choco install -y nasm
          pip3 install toml

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '14e7bb4ae24616ec54ff6b2f6ef4e8659434ea44'

      - name: Install vcpkg dependencies
        run: |
          vcpkg install libvpx:x64-windows-static libyuv:x64-windows-static opus:x64-windows-static aom:x64-windows-static
        shell: cmd
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg

      - name: Configure custom server settings
        shell: pwsh
        run: |
          $configContent = @"
          rendezvous_server = '${{ secrets.RENDEZVOUS_SERVER }}'
          relay_server = '${{ secrets.RELAY_SERVER }}'
          key = '${{ secrets.RS_PUB_KEY }}'
          "@
          
          New-Item -ItemType Directory -Force -Path "res" | Out-Null
          $configContent | Out-File -FilePath "res\custom_config.toml" -Encoding UTF8
          
          Write-Host "Configuration created:"
          Get-Content "res\custom_config.toml"

      - name: Build rustdesk
        shell: cmd
        run: |
          set VCPKG_ROOT=%GITHUB_WORKSPACE%\vcpkg
          python build.py --portable --hwcodec
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}

      - name: Find and rename output file
        shell: pwsh
        run: |
          $version = "custom"
          
          # Chercher l'exécutable dans différents endroits possibles
          $searchPaths = @(
            ".\flutter\build\windows\x64\runner\Release",
            ".\flutter\build\windows\runner\Release",
            ".\target\release"
          )
          
          foreach ($searchPath in $searchPaths) {
            if (Test-Path $searchPath) {
              Write-Host "Searching in: $searchPath"
              $files = Get-ChildItem -Path $searchPath -Filter "*.exe" -ErrorAction SilentlyContinue
              
              if ($files) {
                foreach ($file in $files) {
                  Write-Host "Found: $($file.FullName)"
                  $newName = "rustdesk-eole-$version-x86_64.exe"
                  Copy-Item $file.FullName -Destination ".\$newName"
                  Write-Host "Created: $newName"
                  exit 0
                }
              }
            }
          }
          
          Write-Host "No executable found, listing all files..."
          Get-ChildItem -Recurse -Filter "*.exe" | Select-Object FullName

      - name: Upload artifact
        if: ${{ inputs.upload-artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-eole-windows
          path: rustdesk-eole-*.exe
          retention-days: 30
          if-no-files-found: warn
