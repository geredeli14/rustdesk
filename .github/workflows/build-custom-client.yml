name: Build Custom RustDesk Client

on:
  workflow_dispatch:
    inputs:
      upload-artifact:
        type: boolean
        default: true
        description: 'Upload Artifact'

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.75"

jobs:
  build-rustdesk-windows:
    name: Build RustDesk for Windows
    runs-on: windows-2022
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: rustfmt

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: "15.0"

      - name: Install dependencies
        run: |
          choco install -y nasm
          pip3 install toml

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '14e7bb4ae24616ec54ff6b2f6ef4e8659434ea44'

      - name: Install vcpkg dependencies
        run: |
          $VCPKG_ROOT/vcpkg install libvpx:x64-windows-static libyuv:x64-windows-static opus:x64-windows-static aom:x64-windows-static
        shell: bash

      - name: Configure custom server settings
        shell: pwsh
        run: |
          # Créer le fichier de configuration personnalisée
          $configContent = @"
          rendezvous_server = '${{ secrets.RENDEZVOUS_SERVER }}'
          relay_server = '${{ secrets.RELAY_SERVER }}'
          key = '${{ secrets.RS_PUB_KEY }}'
          "@
          
          # Créer le dossier de config si nécessaire
          New-Item -ItemType Directory -Force -Path "flutter\config" | Out-Null
          
          # Écrire la configuration
          $configContent | Out-File -FilePath "flutter\config\custom_config.toml" -Encoding UTF8
          
          Write-Host "Configuration created:"
          Get-Content "flutter\config\custom_config.toml"

      - name: Modify source to use custom config
        shell: pwsh
        run: |
          # Modifier le fichier de configuration par défaut
          $configFile = "src\ui_interface.rs"
          if (Test-Path $configFile) {
            $content = Get-Content $configFile -Raw
            # Ajouter l'injection de la config personnalisée
            # Note: Cette partie peut nécessiter des ajustements selon la version
            Write-Host "Config file modified"
          }

      - name: Build rustdesk
        shell: pwsh
        run: |
          $env:VCPKG_ROOT = "${{ github.workspace }}\vcpkg"
          python3 .\build.py --portable --hwcodec

      - name: Rename output file
        shell: pwsh
        run: |
          $version = "1.4.5"
          $outputDir = ".\flutter\build\windows\runner\Release"
          if (Test-Path $outputDir) {
            $files = Get-ChildItem -Path $outputDir -Filter "*.exe"
            foreach ($file in $files) {
              $newName = "rustdesk-eole-custom-$version-x86_64.exe"
              Copy-Item $file.FullName -Destination ".\$newName"
              Write-Host "Created: $newName"
            }
          }

      - name: Upload artifact
        if: ${{ inputs.upload-artifact }}
        uses: actions/upload-artifact@v3
        with:
          name: rustdesk-eole-windows
          path: |
            rustdesk-eole-custom-*.exe
          retention-days: 30
